name: Release for Raspberry Pi

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ej. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ''
            archive: tar.gz
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            archive: tar.gz
          - name: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ''
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Show toolchain
        run: |
          go version
          go env GOOS GOARCH GOARM

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOARM: ${{ matrix.target.goarm }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out="dist/panel_admin"
          if [ "${{ matrix.target.goos }}" = "windows" ]; then out="${out}.exe"; fi
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "$out" \
            .
          ls -lh "$out"
          file "$out"

      - name: Package (tar.gz)
        if: matrix.target.archive == 'tar.gz'
        working-directory: dist
        run: |
          bin="panel_admin"
          [ "${{ matrix.target.goos }}" = "windows" ] && bin="${bin}.exe"
          cp ../README.md .
          cp ../ecosystem.config.js . || true
          tar -czf "panel_admin-${{ matrix.target.name }}.tar.gz" "$bin" README.md
          ls -lh "panel_admin-${{ matrix.target.name }}.tar.gz"

      - name: Generate SHA256
        working-directory: dist
        run: |
          sha256sum "panel_admin-${{ matrix.target.name }}.tar.gz" \
            > "panel_admin-${{ matrix.target.name }}.tar.gz.sha256"
          cat "panel_admin-${{ matrix.target.name }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: panel_admin-${{ matrix.target.name }}
          path: |
            dist/panel_admin-${{ matrix.target.name }}.tar.gz
            dist/panel_admin-${{ matrix.target.name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag: ${{ steps.tag.outputs.name }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -lhR artifacts/

      - name: Consolidate checksums
        run: |
          cat artifacts/*/*.sha256 > artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*/panel_admin-linux-arm64.tar.gz
            artifacts/*/panel_admin-linux-armv7.tar.gz
            artifacts/*/panel_admin-linux-amd64.tar.gz
            artifacts/*/panel_admin-linux-arm64.tar.gz.sha256
            artifacts/*/panel_admin-linux-armv7.tar.gz.sha256
            artifacts/*/panel_admin-linux-amd64.tar.gz.sha256
            artifacts/SHA256SUMS
          body: |
            ## Binarios para Raspberry Pi

            Descarga el archivo que corresponda a tu modelo:

            | Modelo                          | Archivo                                      |
            | ------------------------------- | -------------------------------------------- |
            | Raspberry Pi 4, Pi 5, Zero 2 W  | `panel_admin-linux-arm64.tar.gz`             |
            | Raspberry Pi 2 v1.2, Pi 3, Pi 3+ | `panel_admin-linux-armv7.tar.gz`             |
            | PC / servidor x86_64            | `panel_admin-linux-amd64.tar.gz`             |

            ### Instalacion rapida

            ```bash
            tar -xzf panel_admin-linux-arm64.tar.gz
            chmod +x panel_admin
            ./panel_admin                  # puerto por defecto 8080
            # o bien: ./panel_admin --port 4041
            ```

            Abre `http://<ip-de-tu-pi>:8080` en el navegador.

            Verifica la integridad con `SHA256SUMS`:

            ```bash
            sha256sum -c SHA256SUMS
            ```
